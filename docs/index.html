<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Foxy — AI Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="logo-section">
          <svg class="fox-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="35" cy="35" r="6" fill="currentColor"/>
            <circle cx="65" cy="35" r="6" fill="currentColor"/>
            <path d="M 40 55 Q 50 65 60 55" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
          <div>
            <h1>Foxy</h1>
            <p class="sub">Your clever AI companion</p>
          </div>
        </div>
        <div class="header-controls">
          <button id="themeToggle" class="control-btn" title="Toggle theme">🌙</button>
          <input id="colorPicker" type="color" class="color-input" title="Pick accent color">
          <button id="clearBtn" class="control-btn" title="Clear chat">🗑️</button>
        </div>
      </div>
    </header>

    <!-- Messages -->
    <section id="messages" class="messages" aria-live="polite"></section>

    <!-- Input -->
    <form id="chatForm" class="inputBar">
      <textarea id="messageInput" placeholder="Ask Foxy anything..." rows="1" aria-label="Message"></textarea>
      <button id="sendBtn" type="submit" class="send-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </button>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>

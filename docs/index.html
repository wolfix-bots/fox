<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Foxy — Cyber AI</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
  </style>
</head>
<body>
  <div class="cyber-bg"></div>
  <main class="app">
    <header class="header">
      <div class="header-inner">
        <div class="fox-icon cyber-glow">🦊</div>
        <div class="header-text">
          <h1 class="cyber-title">F0XY.AI</h1>
          <p class="sub cyber-sub">[ NEURAL INTERFACE ACTIVE ]</p>
        </div>
      </div>
    </header>

    <section id="messages" class="messages" aria-live="polite"></section>

    <form id="chatForm" class="inputBar">
      <textarea id="messageInput" placeholder="> ENTER COMMAND..." rows="1" aria-label="Message"></textarea>
      <button id="sendBtn" type="submit" class="send-btn cyber-btn">⚡</button>
    </form>
    <p class="note cyber-note">
      [ ⚡ NEURAL SYNC MODE | NO PERSISTENT MEMORY ] <a href="https://github.com/wolfix-bots/fox" target="_blank" class="cyber-link">DEPLOY FULL SYSTEM</a>
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
